<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Books</title>

  <link rel="stylesheet" href="./books.css">

</head>
<body>

  <section class="hero-section">
  <header>
   <a href="../main/main.html"><div><h2>Main</h2></div></a>
  </header>

  <div class="video-container">
    <video autoplay muted loop playsinline preload="auto">
      <source src="./videos/bookPageFlip.mp4" type="video/mp4">
    </video>
    <div class="video-overlay">
      <div>
        <h1>Books</h1>
        <p>Love reading books ✧˖°.🎧</p>
      </div>
    </div>
  </div>

  </section>


  <main>
    <section class="mini-hero">
      <div>
        <h3>Explore my reads 📖</h3>
      </div>
    </section>

    <section class="books-section">

      <!--!  Currently Reading Section  -->

      <div class="reading-section">

        <div class="book-content">
          <div class="section-title">
            <h2>Currently Reading</h2>
          </div>
           
          <div class="book-shelf" id="bookShelf">
          </div>
          <!-- <section class="book-shelf-stand"></section> -->



        </div>

        <div class="book-info" id="bookInfo">
          <div class="author-info">
              <div class="author-name">
                <h2 id="name"></h2>
              </div>
              <div class="author-bio">
                <p id="age"></p>
                <p id="nationality"></p>
                <p id="genre"></p>
                <div>
                 <p>Current Thoughts?</p>
                 <p id="wiltb"></p>                
                </div>
              </div>

          </div>
          <div class="author-picture" id="authorPic">
          </div>
        </div>

        
          
              <div class="book-info-overlay show" id="currentBookInfoOverlay">
                <h2>Click on a book to learn about the author!</h2>
              </div>
      </div>



      <!--!  Up Next Reading Section  -->



      <div class="reading-section">
        <div class="book-content">
          <div class="section-title">
            <h2>Up Next</h2>
          </div>
           
          <div class="book-shelf" id="bookShelf-2">
           
          </div>
          <!-- <div class="book-shelf-stand"></div> -->  
        </div>

        <div class="book-info" id="bookInfo-2">
          <div class="author-info">
              <div class="author-name">
                <h2 id="name-2"></h2>
              </div>
              <div class="author-bio">
                <p id="age-2"></p>
                <p id="nationality-2"></p>
                <p id="genre-2"></p>
                <div>
                 <p>Why I like this book?</p>
                 <p id="wiltb-2"></p>                
                </div>
              </div>
          </div>
          <div class="author-picture" id="authorPic-2">
          </div>
        </div>  
        
            <div class="book-info-overlay show" id="upNextBookInfoOverlay">
                <h2>Click on a book to learn about the author!</h2>
            </div>
      </div>





      <!--! Finished Reading Section  -->

      <div class="reading-section">
        <div class="book-content">
          <div class="section-title">
            <h2>Completed</h2>
          </div>
           
          <div class="book-shelf" id="bookShelf-3">
           
          </div>
          <!-- <section class="book-shelf-stand"></section> -->
        </div>


        <div class="book-info" id="bookInfo-3">
          <div class="author-info">
              <div class="author-name">
                <h2 id="name-3"></h2>
              </div>
              <div class="author-bio">
                <p id="age-3"></p>
                <p id="nationality-3"></p>
                <p id="genre-3"></p>
                <div>
                 <p>Thoughts?</p>
                 <p id="wiltb-3"></p>                
                </div>
              </div>            
          </div>

          <div class="author-picture" id="authorPic-3">
          </div>
        </div> 
        
        
                <div class="book-info-overlay show" id="completedBookInfoOverlay">
                <h2>Click on a book to learn about the author!</h2>
              </div>  
      </div>


    </section>


  </main>

  
 
  <script src="books.js"></script>
</body>
</html>
