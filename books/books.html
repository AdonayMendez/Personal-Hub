<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Books</title>

  <link rel="stylesheet" href="./books.css">

</head>
<body>

  <section class="hero-section">
  <header>
   <a href="../main/main.html"><div><h2>Main</h2></div></a>
  </header>

  <div class="video-container">
    <video autoplay muted loop>
      <source src="../music-bg-video-1.mp4" type="video/mp4">
    </video>
    <div class="video-overlay">
      <div>
        <h1>Books</h1>
        <p>Love reading books ✧˖°.🎧</p>
      </div>
    </div>
  </div>

  </section>


  <main>
    <section class="mini-hero">
      <div>
        <h3>Explore my reads 📖</h3>
      </div>
    </section>

    <section class="books-section">
      <div class="currently-reading-section">

        <div class="book-content">
          <div class="section-title">
            <h2>Currently Reading</h2>
          </div>
          <div class="book-shelf" id="bookShelf">

          </div>
            <div class="book-shelf-stand"></div>
        </div>

        <div class="book-info show" id="bookInfo">
          <div class="author-info">
              <div class="author-name">
                <h2 id="name"></h2>
              </div>
              <div class="author-bio">
                <p id="age"></p>
                <p id="nationality"></p>
                <p id="genre"></p>
                <div>
                 <p>Why I like this book?</p>
                 <p id="wiltb"></p>                
                </div>
              </div>
          </div>
          <div class="author-picture" id="authorPic">

          </div>

        </div>
      </div>



      <div class="currently-reading-section"></div>
      <div class="currently-reading-section"></div>
    </section>


  </main>

  
 
  <script src="books.js"></script>
</body>
</html>
